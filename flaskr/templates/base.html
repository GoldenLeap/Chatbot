<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - Assistente Academico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/history.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/markdown.css') }}">

    <!-- KaTeX CSS for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

    {% block extra_css %}{% endblock %}
</head>

<body>
    <header class="app-header">
        <div class="header-container">
            <a href="{{ url_for('index') }}">
                <img src="{{ url_for('static', filename='images/avatar.png') }}" alt="Mascote Guaxinim">
                <h1>Assistente Acadêmico</h1>
            </a>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="{{ url_for('index') }}" class="nav-link">Inicio</a></li>
                <li><a href="{{ url_for('chat.history') }}" class="nav-link">Histórico</a></li>
            </ul>
        </nav>
    </header>

    <main class="app-content">
        {% block content %}{% endblock %}
    </main>
    <footer class="app-footer">
        <p>Seu assistente virtual de estudos</p>
        <p>&copy; 2026</p>
    </footer>

    <!-- KaTeX JS for Math Rendering -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

    {% block extra_js %}{% endblock %}
</body>

</html>
